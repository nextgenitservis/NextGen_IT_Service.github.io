<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Comandă</title>
<link rel="icon" href="logo.png">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
    font-family:'Segoe UI';
    background-image: url("bg.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

.form{
    background:#111;
    padding:25px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 30px #a855f7;
}

.telefonBox{
    display:flex;
    gap:10px;
}

select,input{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1a1a1a;
    color:white;
}

input{ width:100%; }

#nume {width: 93%; margin-bottom: 2%;}

.optiune{
    padding:10px;
    margin:5px 0;
    background:#1a1a1a;
    border-radius:8px;
    cursor:pointer;
}

.optiune.selectat{
    border:2px solid #a855f7;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    pointer-events:none;
    transition:0.5s;
    z-index:9999;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

.chitanta{
    background:#111;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 40px #a855f7;
    transform:translateY(200px);
    transition:1s;
}

.overlay.show .chitanta{
    transform:translateY(0);
}

.linie{
    margin:6px 0;
    opacity:0;
}

.linie.show{
    animation:fadeIn 0.4s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

.reducere{color:#22c55e;}
.tva{color:#facc15;}
.total{color:#a855f7;font-weight:bold;}

.btn{
    margin-top:15px;
    width:100%;
    padding:15px;
    background:#a855f7;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="form">
<h3>Date client</h3>

<input type="text" id="nume" placeholder="Nume" required>

<div class="telefonBox">
<select id="prefix">
<option value="+40">🇷🇴 +40</option>
<option value="+44">🇬🇧 +44</option>
<option value="+49">🇩🇪 +49</option>
</select>

<input type="tel" id="telefon" placeholder="Telefon (9-10 cifre)" required>
</div>

<h4>Plată</h4>
<div class="optiune" onclick="selectPlata('Cash',this)">💵 Cash</div>
<div class="optiune" onclick="selectPlata('Card',this)">💳 Card</div>

<h4>Livrare</h4>
<div class="optiune" onclick="selectLivrare('Ridicare',this)">🏠 Ridicare</div>
<div class="optiune" onclick="selectLivrare('Curier',this)">🚚 Curier (+15)</div>

<button class="btn" onclick="genereaza()">Generează chitanța</button>
</div>

<!-- CHITANTA -->
<div class="overlay" id="overlay">
<div class="chitanta">

<h2>🧾 Chitanță</h2>

<div class="linie" id="l1"></div>
<div class="linie" id="l2"></div>
<div class="linie" id="l3"></div>
<div class="linie" id="l4"></div>
<div class="linie reducere" id="l5"></div>
<div class="linie tva" id="l6"></div>
<div class="linie" id="l7"></div>
<div class="linie" id="l8"></div>
<div class="linie total" id="l9"></div>

<button class="btn" onclick="finalizare()">Finalizează</button>

</div>
</div>

<script>
emailjs.init("GNsJuo4zc-jQgAcPB");

let plata=null;
let livrare=null;

// SELECT PLATA
function selectPlata(val,el){
    plata=val;
    document.querySelectorAll('.optiune').forEach(e=>{
        if(e.innerText.includes("Cash")||e.innerText.includes("Card"))
            e.classList.remove('selectat');
    });
    el.classList.add('selectat');
}

// SELECT LIVRARE
function selectLivrare(val,el){
    livrare=val;
    document.querySelectorAll('.optiune').forEach(e=>{
        if(e.innerText.includes("Ridicare")||e.innerText.includes("Curier"))
            e.classList.remove('selectat');
    });
    el.classList.add('selectat');
}

// LIMITARE TELEFON 🔥
window.onload = function(){
    document.getElementById("telefon").addEventListener("input", function () {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
    });
}

// GENERARE CHITANTA
function genereaza(){

let nume=document.getElementById("nume").value;
let tel=document.getElementById("telefon").value;
let prefix=document.getElementById("prefix").value;

if(!nume || tel.length < 9 || tel.length > 10 || !plata || !livrare){
    alert("Completează corect!");
    return;
}

let telefonFinal=prefix+tel;

let serviciu=localStorage.getItem("serviciu");
let pret=parseFloat(localStorage.getItem("pret"));
let pretInitial=parseFloat(localStorage.getItem("pretInitial"));

let tva=Math.round(pret*0.19);
let total=pret+tva;

if(livrare==="Curier") total+=15;

let linii=[
`Serviciu: ${serviciu}`,
`Nume: ${nume}`,
`Telefon: ${telefonFinal}`,
`Preț inițial: ${pretInitial} RON`,
`Reducere: -${pretInitial-pret} RON`,
`TVA (19%): ${tva} RON`,
`Plată: ${plata}`,
`Livrare: ${livrare}`,
`TOTAL: ${total} RON`
];

let ids=["l1","l2","l3","l4","l5","l6","l7","l8","l9"];

ids.forEach((id,i)=>{
    document.getElementById(id).innerText=linii[i];
});

document.getElementById("overlay").classList.add("show");

ids.forEach((id,i)=>{
    setTimeout(()=>{
        document.getElementById(id).classList.add("show");
    }, i*200);
});
}

// TRIMITERE EMAIL
function finalizare(){

let nume=document.getElementById("nume").value;
let tel=document.getElementById("prefix").value + document.getElementById("telefon").value;

let serviciu=localStorage.getItem("serviciu");
let pret=localStorage.getItem("pret");

emailjs.send("service_zb0rhpr","template_kze240g",{
    nume:nume,
    telefon:tel,
    serviciu:serviciu,
    pret:pret,
    plata:plata,
    livrare:livrare
})
.then(()=>alert("✅ Comanda trimisă!"))
.catch(()=>alert("❌ Eroare la trimitere!"));
}
</script>

</body>
</html>
